<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Successful - Airbot</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            max-width: 400px;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        .auth-card h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .auth-card p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .redirect-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="stars"></div>
        <div class="stars2"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                </svg>
            </div>
            <h1>Login Successful!</h1>
            <p>Welcome to Airbot. You're now signed in with Google.</p>
            <p class="redirect-text">Redirecting to the app...</p>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            // Store token in localStorage
            localStorage.setItem('airbot_token', token);

            // Redirect to main app after 2 seconds
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        } else {
            document.querySelector('h1').textContent = 'Login Failed';
            document.querySelector('p').textContent = 'No token received. Please try again.';
            document.querySelector('.success-icon').style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
        }
    </script>
</body>
</html>
