<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Airbot</title>
    <link rel="icon" type="image/svg+xml" href="assets/airbot-logo.svg">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            max-width: 500px;
        }
        .denied-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .denied-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        .auth-card h1 {
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .auth-card p {
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .note {
            margin-top: 14px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: 8px;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            background: var(--gradient-1);
        }
    </style>
</head>
<body>
    <div class="background-animation">
        <div class="stars"></div>
        <div class="stars2"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="denied-icon">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"></circle>
                    <path d="M15 9L9 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    <path d="M9 9L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                </svg>
            </div>
            <h1>Access Denied</h1>
            <p id="deniedMessage">You are not authorized to access Test Case Generator.</p>
            <p class="note">Only Google accounts ending with @student.tce.edu or @tce.edu are allowed for this feature.</p>

            <div class="actions">
                <a class="action-btn" href="/">Back to General Chat</a>
            </div>
        </div>
    </div>

    <script>
        const reason = new URLSearchParams(window.location.search).get('reason');
        const deniedMessage = document.getElementById('deniedMessage');

        if (reason === 'login_required') {
            deniedMessage.textContent = 'Member login required. Sign in with Google to continue.';
        } else if (reason === 'domain_restricted') {
            deniedMessage.textContent = 'Your Google account is not authorized for Test Case Generator.';
        }
    </script>
</body>
</html>
